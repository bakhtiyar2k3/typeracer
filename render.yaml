# Render Blueprint — one free web service that serves the SPA + API + sockets.
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo -> set MONGODB_URI.
# Pair with a free MongoDB Atlas (M0) cluster (see README "Deploy" section).
services:
  - type: web
    name: typeracer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: MONGODB_URI
        sync: false # set in the dashboard: your Atlas connection string
      - key: CLIENT_ORIGIN
        sync: false # optional: set to your https://<app>.onrender.com to lock CORS
